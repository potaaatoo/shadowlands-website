<!DOCTYPE HTML>
    <html>
        <head>
            <title>ShadowLands PVP</title>
            <link rel="stylesheet" href="styles.css"/>
            <meta content="ShadowLands PVP - En développement" property="og:title" />
            <meta content="En développement" property="og:description" />
            <meta content="https://shadowlandspvp.netlify.app/" property="og:url" />
            <meta content="https://cdn.discordapp.com/icons/1307664641714950207/3c04df9080c04c8ab1df780312ad7989.webp?size=1024" property="og:image" />
            <meta content="#43B581" data-react-helmet="true" name="theme-color" />
        </head>
        <body>
            <header>
                <h1 class="jetbrains-mono-100">ShadowLands PVP</h1>
                <hr>
                    <div id="menu">
                        <a href="https://discord.gg/hXJ6R92pEU"/><button>Discord</button></a>
                        <button id="copyButton">Minecraft</button>
                        <span id="tooltip" class="tooltip">IP copiée !</span>
                    </div>
                    <p id="textToCopy">Ip du serveur</p>
            </header>
            
            <script src='https://cdn.jsdelivr.net/npm/@widgetbot/crate@3' async defer>
                new Crate({
                    server: '1307664641714950207',
                    channel: '1307698424795365418'
                })
            </script>
        </body>
        <script>
            document.getElementById("copyButton").addEventListener("click", function () {
    const textToCopy = document.getElementById("textToCopy").textContent;

    navigator.clipboard.writeText(textToCopy).then(() => {
        const tooltip = document.getElementById("tooltip");
        tooltip.classList.add("show");

        setTimeout(() => {
            tooltip.classList.remove("show");
        }, 2000);
    }).catch(err => {
        console.error("Erreur lors de la copie : ", err);
    });
});
        </script>
    </html>
