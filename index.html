            <header>
                <h1 class="jetbrains-mono-100">ShadowLands PVP</h1>

                    <div id="menu">
                        <a href="https://discord.gg/hXJ6R92pEU"/><button>Discord</button></a>
                        <button id="copyButton">Minecraft</button>
                        <span id="tooltip" class="tooltip">IP copiée !</span>
                    </div>
                    <p id="textToCopy">Ip du serveur</p>

            <br>

            <script src='https://cdn.jsdelivr.net/npm/@widgetbot/crate@3' async defer>
                new Crate({
                    server: '1307664641714950207',
                    channel: '1307698424795365418'
                })
            </script>
        </body>
        <script>
            document.getElementById("copyButton").addEventListener("click", function () {
    const textToCopy = document.getElementById("textToCopy").textContent;

    navigator.clipboard.writeText(textToCopy).then(() => {
        const tooltip = document.getElementById("tooltip");
        tooltip.classList.add("show");

        setTimeout(() => {
            tooltip.classList.remove("show");
        }, 2000);
    }).catch(err => {
        console.error("Erreur lors de la copie : ", err);
    });
});
        </script>
